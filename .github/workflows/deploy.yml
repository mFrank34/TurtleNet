name: Deploy (Podman)

on:
  push:
    branches: [ deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e

            cd ~/projects/TurtleNet

            echo "Pulling latest deploy branch..."
            git pull origin deploy

            echo "Stopping old container..."
            podman stop turtlenet || true
            podman rm turtlenet || true

            echo "Removing old image..."
            podman rmi turtlenet-server || true

            echo "Building fresh image..."
            podman build --no-cache -t turtlenet-server .

            echo "Running new container..."
            podman run -d \
              --name turtlenet \
              -p 8000:8000 \
              --restart=always \
              -v ~/projects/TurtleNet/data:/app/data:z \
              turtlenet-server