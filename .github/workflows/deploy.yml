name: Deploy (Podman)

on:
  push:
    branches: [ deploy ]

jobs:
  deploy:
    # Tell GitHub to use your local machine's runner instead of a cloud instance
    runs-on: self-hosted

    steps:
      # Natively downloads the repository files straight into the runner workspace
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy Container Natively
        run: |
          set -e

          echo "Stopping old container..."
          podman stop turtlenet || true
          podman rm turtlenet || true

          echo "Removing old image..."
          podman rmi turtlenet-server || true

          echo "Building fresh image..."
          podman build --no-cache -t turtlenet-server .

          echo "Setting up pod..."
          podman pod exists pod_turtlenet || podman pod create --name pod_turtlenet --network=host
          
          echo "Running new container..."
          podman run -d \
            --name turtlenet \
            --pod pod_turtlenet \
            -v ./data:/app/data:z \
            turtlenet-server